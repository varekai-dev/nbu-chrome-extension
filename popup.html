<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBU Coins - Auto Add</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1 class="title">NBU Coins Auto</h1>
      <p class="subtitle">Автоматичне додавання товарів</p>
    </div>

    <div class="content">
      <!-- Текстове поле для фільтру -->
      <div id="filterGroup" class="input-group">
        <label for="filterInput" class="input-label">Назва товару для відстеження:</label>
        <input type="text" id="filterInput" class="text-input" placeholder="Введіть точну назву товару"
          aria-label="Назва товару для відстеження">
      </div>

      <!-- Інтервал оновлення сторінки -->
      <div class="input-group">
        <label for="refreshIntervalInput" class="input-label">Інтервал оновлення (мс):</label>
        <input type="number" id="refreshIntervalInput" class="text-input" min="210" max="1210" value="1210"
          aria-label="Інтервал оновлення сторінки в мілісекундах">
        <span class="input-hint">від 210 до 1210 мс</span>
      </div>

      <!-- Запланований час старту -->
      <div class="input-group">
        <label for="scheduledTimeInput" class="input-label">Запланований час старту:</label>
        <div class="datetime-wrapper">
          <input type="datetime-local" id="scheduledTimeInput" class="text-input datetime-input" step="1"
            aria-label="Запланований час старту моніторингу">
          <button id="clearScheduledTime" class="clear-btn" title="Очистити запланований час"
            aria-label="Очистити запланований час">×</button>
        </div>
      </div>

      <!-- Toggle switch -->
      <div class="toggle-group">
        <div class="toggle-container">
          <label class="toggle-switch" for="autoToggle">
            <input type="checkbox" id="autoToggle" aria-label="Увімкнути автоматичний режим">
            <span class="toggle-slider"></span>
          </label>
          <div class="toggle-info">
            <span class="toggle-label">Автоматичний режим</span>
            <span id="statusIndicator" class="status-indicator">Вимкнено</span>
          </div>
        </div>
      </div>

      <!-- Статус відстеження -->
      <div id="trackingStatus" class="tracking-status hidden">
        <div class="status-card">
          <div id="statusIcon" class="status-icon">🔍</div>
          <div id="statusDescription" class="status-description">Шукаю товар...</div>
        </div>
      </div>

      <!-- Повідомлення про статус -->
      <div id="statusMessage" class="status-message hidden">
        <p id="statusText"></p>
      </div>

      <!-- Повідомлення про помилку -->
      <div id="errorMessage" class="error-message hidden">
        <p id="errorText"></p>
      </div>
    </div>

    <div class="footer">
      <p class="footer-text">
        Відстежує один товар за точною назвою<br>
        Працює тільки на coins.bank.gov.ua
      </p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
